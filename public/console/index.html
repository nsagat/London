<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>London · GTM Intelligence Platform</title>
<link rel="icon" type="image/png" href="assets/ember-mascot.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<!-- mascot source used by shell.jsx -->
<script>window.MASCOT_SRC = "assets/ember-mascot.png";</script>

<!-- React + Babel (in-browser transform, same as the original design) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Design source (loaded in order; components are global) -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<!-- live API layer: overrides window.LondonData with real Bright Data when reachable -->
<script type="text/babel" src="live.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="workspace.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="builder.jsx"></script>
<script type="text/babel" src="marketplace.jsx"></script>
<script type="text/babel" src="analytics.jsx"></script>
<script type="text/babel" src="integrations.jsx"></script>
<script type="text/babel" src="governance.jsx"></script>
<script type="text/babel" src="accesscontrol.jsx"></script>
<script type="text/babel" src="account.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
